<style>

body{
margin:0;
font-family:'Inter', sans-serif;
background:#f4f1ec;
color:#222;
padding-bottom:140px;
}

/* HEADER */

header{
background:#2c1b12;
padding:20px;
text-align:center;
color:#f5d7a1;

}

/* PAGE TITLE */

.page-title{
text-align:center;
padding:60px 20px 30px;
font-family:'Playfair Display', serif;
font-size:42px;
}

/* GRID */

.menu-grid{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:20px;
}

/* CARD */

.menu-card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.35s;
}

.menu-card:hover{
transform:translateY(-10px);
box-shadow:0 18px 40px rgba(0,0,0,0.18);
}

/* IMAGE */

.menu-card img{
width:100%;
height:250px;
object-fit:cover;
}

/* TITLE */

.menu-card h3{
padding:20px;
text-align:center;
font-weight:500;
font-size:20px;
}

/* FOOTER */

footer{
background:#2c1b12;
color:white;
text-align:center;
padding:40px 20px;
margin-top:80px;
}

/* WHATSAPP BUTTON */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
padding:16px 24px;
border-radius:50px;
text-decoration:none;
font-weight:600;
box-shadow:0 12px 25px rgba(0,0,0,0.25);
transition:0.3s;
}

.whatsapp:hover{
transform:scale(1.08);
}

</style>
</head>
